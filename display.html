<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tambola — Live Board</title>
<link rel="stylesheet" href="/style.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Manrope:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  body { overflow-x: hidden; }
  .stage {
    position: relative; z-index: 1;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 22px 18px 40px;
  }
  header.top {
    width: 100%;
    max-width: 1100px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 18px;
  }
  .brand { display: flex; flex-direction: column; }
  .brand .wordmark { font-size: 30px; line-height: 1; }
  .brand .eyebrow { margin-top: 2px; }
  .status-pill {
    display: flex; align-items: center; gap: 8px;
    background: var(--surface);
    border: 1px solid var(--line);
    padding: 8px 14px;
    border-radius: 999px;
    font-size: 13px;
    color: var(--muted);
  }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); transition: background 0.2s; }
  .dot.live { background: var(--green); box-shadow: 0 0 8px var(--green); }
  .dot.paused { background: var(--gold); box-shadow: 0 0 8px var(--gold); }

  /* ===== Reveal centerpiece ===== */
  .reveal-wrap {
    perspective: 1200px;
    margin: 18px 0 26px;
  }
  .reveal {
    position: relative;
    width: 260px; height: 260px;
    border-radius: 50%;
    background: radial-gradient(circle at 32% 28%, #3a3470, var(--surface) 55%, #16143a 100%);
    border: 3px solid var(--gold);
    box-shadow: 0 0 0 8px rgba(232,176,75,0.08), var(--shadow);
    display: flex; align-items: center; justify-content: center;
    transform-style: preserve-3d;
  }
  .reveal.spin { animation: flipReveal 0.7s cubic-bezier(.2,.8,.3,1); }
  @keyframes flipReveal {
    0%   { transform: rotateY(0deg) scale(1); }
    35%  { transform: rotateY(180deg) scale(1.08); }
    60%  { transform: rotateY(360deg) scale(1.1); }
    100% { transform: rotateY(360deg) scale(1); }
  }
  .reveal .glow {
    position: absolute; inset: -18px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(232,176,75,0.55), transparent 70%);
    opacity: 0;
  }
  .reveal.spin .glow { animation: glowPulse 0.9s ease-out; }
  @keyframes glowPulse {
    0% { opacity: 0; transform: scale(0.7); }
    35% { opacity: 1; transform: scale(1.15); }
    100% { opacity: 0; transform: scale(1.4); }
  }
  .reveal .num {
    font-family: var(--font-display);
    font-size: 108px;
    color: var(--gold-bright);
    line-height: 1;
    text-shadow: 0 4px 18px rgba(0,0,0,0.5);
  }
  .reveal .num.placeholder { font-size: 40px; color: var(--muted); font-family: var(--font-body); font-weight: 800; }
  .nickname {
    margin-top: 14px;
    font-size: 16px;
    letter-spacing: 0.04em;
    color: var(--pink-bright);
    min-height: 22px;
    text-align: center;
  }

  /* sparkle particles */
  .particle {
    position: absolute;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--gold-bright);
    top: 50%; left: 50%;
    opacity: 0;
    pointer-events: none;
  }
  .reveal.spin .particle { animation: spark 0.8s ease-out forwards; }
  @keyframes spark {
    0% { opacity: 1; transform: translate(0,0) scale(1); }
    100% { opacity: 0; transform: translate(var(--dx), var(--dy)) scale(0.3); }
  }

  /* ===== Recent strip ===== */
  .recent {
    display: flex; gap: 10px; margin-bottom: 26px; flex-wrap: wrap; justify-content: center;
  }
  .chip {
    width: 42px; height: 42px; border-radius: 50%;
    background: var(--surface); border: 1px solid var(--line);
    display: flex; align-items: center; justify-content: center;
    font-weight: 800; font-size: 15px; color: var(--muted);
  }
  .chip.latest { background: var(--pink); border-color: var(--pink-bright); color: var(--cream); }

  /* ===== Grid ===== */
  .board {
    width: 100%; max-width: 1100px;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 20px;
    padding: 18px;
    box-shadow: var(--shadow);
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(10, 1fr);
    gap: 6px;
  }
  .cell {
    aspect-ratio: 1;
    display: flex; align-items: center; justify-content: center;
    border-radius: 8px;
    background: var(--bg-2);
    color: var(--muted);
    font-weight: 700;
    font-size: clamp(12px, 1.6vw, 16px);
    border: 1px solid transparent;
    transition: background 0.25s, color 0.25s, transform 0.25s;
  }
  .cell.called {
    background: linear-gradient(160deg, var(--gold), #c98f34);
    color: #241a05;
    animation: pop 0.4s ease;
  }
  .cell.current {
    border-color: var(--pink-bright);
    box-shadow: 0 0 0 3px rgba(214,58,114,0.35);
  }
  @keyframes pop {
    0% { transform: scale(0.6); }
    60% { transform: scale(1.12); }
    100% { transform: scale(1); }
  }

  footer.meta {
    margin-top: 18px;
    display: flex; gap: 18px; flex-wrap: wrap; justify-content: center;
    color: var(--muted); font-size: 13px;
  }

  @media (max-width: 640px) {
    .grid { grid-template-columns: repeat(5, 1fr); }
    .reveal { width: 190px; height: 190px; }
    .reveal .num { font-size: 76px; }
  }
</style>
</head>
<body>

<div id="offlineOverlay">
  <div class="icon">⌁</div>
  <h2>You're offline</h2>
  <p>This screen needs an internet connection to receive numbers from the host. Please turn your internet back on.</p>
</div>

<div class="stage">
  <header class="top">
    <div class="brand">
      <div class="wordmark">TAMBOLA</div>
      <div class="eyebrow">Live number board</div>
    </div>
    <div class="status-pill">
      <span class="dot" id="statusDot"></span>
      <span id="statusText">Connecting…</span>
    </div>
  </header>

  <div class="reveal-wrap">
    <div class="reveal" id="reveal">
      <div class="glow"></div>
      <div class="num placeholder" id="revealNum">Waiting to start</div>
    </div>
  </div>
  <div class="nickname" id="nickname"></div>

  <div class="recent" id="recent"></div>

  <div class="board">
    <div class="grid" id="grid"></div>
  </div>

  <footer class="meta">
    <span id="calledCount">0 of 90 called</span>
    <span id="intervalMeta">Interval: —</span>
  </footer>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
  // ---- build grid ----
  const grid = document.getElementById('grid');
  const cells = {};
  for (let i = 1; i <= 90; i++) {
    const c = document.createElement('div');
    c.className = 'cell';
    c.textContent = i;
    grid.appendChild(c);
    cells[i] = c;
  }

  // ---- speech ----
  function speak(number, nickname) {
    if (!('speechSynthesis' in window)) return;
    const text = nickname ? `${number}. ${nickname}` : `Number ${number}`;
    const utter = new SpeechSynthesisUtterance(text);
    utter.lang = 'en-IN';
    utter.rate = 0.95;
    const voices = speechSynthesis.getVoices();
    const enVoice = voices.find(v => v.lang && v.lang.startsWith('en'));
    if (enVoice) utter.voice = enVoice;
    speechSynthesis.cancel();
    speechSynthesis.speak(utter);
  }
  // warm up voice list (Chrome loads async)
  if ('speechSynthesis' in window) speechSynthesis.getVoices();

  // ---- reveal animation ----
  const revealEl = document.getElementById('reveal');
  const revealNum = document.getElementById('revealNum');
  const nicknameEl = document.getElementById('nickname');

  function burstParticles() {
    document.querySelectorAll('.particle').forEach(p => p.remove());
    for (let i = 0; i < 10; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      const angle = (Math.PI * 2 * i) / 10;
      const dist = 90 + Math.random() * 40;
      p.style.setProperty('--dx', Math.cos(angle) * dist + 'px');
      p.style.setProperty('--dy', Math.sin(angle) * dist + 'px');
      revealEl.appendChild(p);
    }
  }

  function showNumber(n, nickname) {
    revealNum.textContent = n;
    revealNum.classList.remove('placeholder');
    nicknameEl.textContent = nickname || '';
    revealEl.classList.remove('spin');
    burstParticles();
    void revealEl.offsetWidth; // restart animation
    revealEl.classList.add('spin');
    speak(n, nickname);
  }

  // ---- recent strip ----
  const recentEl = document.getElementById('recent');
  function renderRecent(called) {
    recentEl.innerHTML = '';
    called.slice(-8).reverse().forEach((n, idx) => {
      const c = document.createElement('div');
      c.className = 'chip' + (idx === 0 ? ' latest' : '');
      c.textContent = n;
      recentEl.appendChild(c);
    });
  }

  // ---- state rendering ----
  const statusDot = document.getElementById('statusDot');
  const statusText = document.getElementById('statusText');
  const calledCount = document.getElementById('calledCount');
  const intervalMeta = document.getElementById('intervalMeta');

  function renderState(state) {
    Object.values(cells).forEach(c => c.classList.remove('current'));
    state.called.forEach(n => cells[n] && cells[n].classList.add('called'));
    if (state.current && cells[state.current]) cells[state.current].classList.add('current');
    renderRecent(state.called);
    calledCount.textContent = `${state.called.length} of 90 called`;
    intervalMeta.textContent = `Interval: ${state.intervalSec}s`;
    statusDot.className = 'dot ' + (state.running ? 'live' : 'paused');
    statusText.textContent = state.running ? 'Calling live' : (state.called.length ? 'Paused' : 'Waiting for host');
    if (!state.current) {
      revealNum.textContent = 'Waiting to start';
      revealNum.classList.add('placeholder');
    }
  }

  // ---- socket ----
  const socket = io();
  socket.on('connect', () => { setOffline(false); });
  socket.on('disconnect', () => { setOffline(true); });
  socket.on('state', renderState);
  socket.on('numberCalled', ({ number, nickname }) => showNumber(number, nickname));
  socket.on('reset', () => {
    Object.values(cells).forEach(c => c.classList.remove('called', 'current'));
    revealNum.textContent = 'Waiting to start';
    revealNum.classList.add('placeholder');
    nicknameEl.textContent = '';
    recentEl.innerHTML = '';
  });
  socket.on('gameOver', () => { nicknameEl.textContent = 'Full house — all 90 called!'; });

  // ---- offline overlay ----
  const overlay = document.getElementById('offlineOverlay');
  let offlineTimer = null;
  function setOffline(isOffline) {
    if (isOffline) {
      offlineTimer = setTimeout(() => overlay.classList.add('show'), 1500);
    } else {
      clearTimeout(offlineTimer);
      overlay.classList.remove('show');
    }
  }
  window.addEventListener('offline', () => setOffline(true));
  window.addEventListener('online', () => setOffline(false));
  if (!navigator.onLine) setOffline(true);

  // ---- offline-first service worker ----
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js').catch(() => {});
  }
</script>
</body>
</html>
