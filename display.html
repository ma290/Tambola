<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tambola Display</title>
  <link rel="stylesheet" href="/style.css">
  <!-- Load Socket.io -->
  <script src="/socket.io/socket.io.js"></script>
</head>
<body>

  <!-- Offline Overlay -->
  <div id="offlineOverlay" class="offline-overlay">
    <div class="offline-content">
      <h2>Offline</h2>
      <p>Reconnecting to server...</p>
    </div>
  </div>

  <header>
    <h1>Tambola / Housie</h1>
    <!-- The Audio Enhancement Button -->
    <button id="soundGate" class="btn">Enable audio announcements</button>
  </header>

  <main>
    <!-- Current Number Display -->
    <div class="current-draw">
      <div id="revealNum" class="placeholder">Waiting to start</div>
      <div id="nickname"></div>
    </div>

    <!-- Tambola 1-90 Board -->
    <div id="board" class="board">
      <!-- Grid cells will be injected here by JavaScript -->
    </div>
  </main>

  <script>
    // ---- Board Initialization ----
    const board = document.getElementById('board');
    for (let i = 1; i <= 90; i++) {
      const cell = document.createElement('div');
      cell.id = 'cell-' + i;
      cell.className = 'cell';
      cell.textContent = i;
      board.appendChild(cell);
    }

    // ---- Audio Enhancement (Sound Gate) ----
    let audioEnabled = false;
    const soundGateBtn = document.getElementById('soundGate');
    
    soundGateBtn.addEventListener('click', () => {
      audioEnabled = true;
      soundGateBtn.textContent = 'Audio Enabled';
      soundGateBtn.disabled = true;
      soundGateBtn.classList.add('success');
      
      // Unlock the Web Audio / Speech Synthesis API on user interaction
      if ('speechSynthesis' in window) {
        const silentUtterance = new SpeechSynthesisUtterance('');
        window.speechSynthesis.speak(silentUtterance);
      }
    });

    function playAudio(number, nickname) {
      if (!audioEnabled) return;
      
      // Attempt to play the specific MP3 file from the audio folder
      const audio = new Audio(`/audio/${number}.mp3`);
      audio.play().catch(() => {
        // Fallback: If no MP3 is found, use text-to-speech
        if ('speechSynthesis' in window) {
          const text = nickname ? `${nickname}... Number ${number}` : `Number ${number}`;
          const utterance = new SpeechSynthesisUtterance(text);
          window.speechSynthesis.speak(utterance);
        }
      });
    }

    // ---- Display Logic ----
    const revealNum = document.getElementById('revealNum');
    const nicknameEl = document.getElementById('nickname');

    function renderState(state) {
      // Clear the board
      document.querySelectorAll('.cell').forEach(c => c.classList.remove('called'));
      
      // Mark all previously called numbers
      if (state.calledNumbers) {
        state.calledNumbers.forEach(num => {
          const cell = document.getElementById('cell-' + num);
          if (cell) cell.classList.add('called');
        });
      }

      // Show the most recently called number
      if (state.lastCalled && state.lastCalled.number) {
        revealNum.textContent = state.lastCalled.number;
        revealNum.classList.remove('placeholder');
        nicknameEl.textContent = state.lastCalled.nickname || '';
      }
    }

    function showNumber(number, nickname) {
      // Update UI with the new number
      revealNum.textContent = number;
      revealNum.classList.remove('placeholder');
      nicknameEl.textContent = nickname || '';
      
      // Highlight it on the board
      const cell = document.getElementById('cell-' + number);
      if (cell) cell.classList.add('called');

      // Trigger audio announcement
      playAudio(number, nickname);
    }

    // ---- offline overlay ----
    const overlay = document.getElementById('offlineOverlay');
    let offlineTimer = null;
    
    function setOffline(isOffline) {
      if (isOffline) {
        offlineTimer = setTimeout(() => overlay.classList.add('show'), 1500);
      } else {
        clearTimeout(offlineTimer);
        overlay.classList.remove('show');
      }
    }
    
    window.addEventListener('offline', () => setOffline(true));
    window.addEventListener('online', () => setOffline(false));
    if (!navigator.onLine) setOffline(true);

    // ---- socket connection & events ----
    const socket = io();

    socket.on('connect', () => setOffline(false));
    socket.on('disconnect', () => setOffline(true));
    
    // Listen for the initial state when connecting
    socket.on('state', renderState);
    
    // Listen for new numbers being drawn
    socket.on('numberCalled', (data) => {
      showNumber(data.number, data.nickname);
    });
    
    // Listen for board reset from admin
    socket.on('reset', () => {
      revealNum.textContent = 'Waiting to start';
      revealNum.classList.add('placeholder');
      nicknameEl.textContent = '';
      document.querySelectorAll('.cell').forEach(c => c.classList.remove('called'));
    });

    // ---- Service Worker Registration (PWA support) ----
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch((err) => {
        console.log('Service Worker registration failed: ', err);
      });
    }
  </script>
</body>
</html>
