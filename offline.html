<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tambola — Offline</title>
<link rel="stylesheet" href="/style.css">
<style>
  body { display: flex; align-items: center; justify-content: center; min-height: 100vh; text-align: center; padding: 24px; }
  .icon { width: 72px; height: 72px; border-radius: 50%; border: 2px solid var(--red); display: flex; align-items: center; justify-content: center; font-size: 30px; color: var(--red); margin: 0 auto 18px; }
  h1 { font-family: var(--font-display); font-size: 36px; margin: 0 0 10px; letter-spacing: 0.03em; }
  p { color: var(--muted); max-width: 360px; margin: 0 auto; }
  button { margin-top: 22px; padding: 12px 22px; background: var(--gold); color: #241a05; font-weight: 800; border-radius: 12px; }
</style>
</head>
<body>
  <div>
    <div class="icon">⌁</div>
    <h1>You're offline</h1>
    <p>Turn your internet connection back on to reconnect to the Tambola board.</p>
    <button onclick="location.reload()">Try again</button>
  </div>
</body>
</html>
